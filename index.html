<!DOCTYPE html>
<html>
<head>
    <title>CRM System</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 25px;
            color: #333;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            color: white;
            background: #4facfe;
            transition: 0.3s;
        }

        button:hover {
            background: #007bff;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>CRM Lead Management System </h1>

        <div class="buttons">
            <button onclick="goToUser()">User</button>
            <button onclick="goToAdmin()">Admin</button>
        </div>
    </div>

    <script>
        function goToUser() {
            alert("User Panel Opening...");
             window.location.href = "user.html";
        }

        function goToAdmin() {
            alert("Admin Panel Opening...");
            window.location.href = "login.html";
        }
    </script>

</body>
</html>
